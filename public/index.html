<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Océane Maligoi Consulting</title>

<!-- Tailwind -->
<script src="https://cdn.tailwindcss.com"></script>

<!-- React + ReactDOM -->
<script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>

<!-- Babel pour JSX -->
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

<!-- Lucide icons -->
<script src="https://unpkg.com/lucide@latest/dist/lucide.min.js"></script>

<style>
body {
  font-family: 'Big Caslon', serif;
}
</style>
</head>
<body class="bg-white">
<div id="root"></div>

<script type="text/babel">

const { useState, useEffect } = React;
const { Menu, X, ArrowRight, CheckCircle } = lucideReact;

function App() {
  const [isMenuOpen, setIsMenuOpen] = useState(false);
  const [email, setEmail] = useState('');
  const toggleMenu = () => setIsMenuOpen(!isMenuOpen);

  const services = [
    { id:1, title:"Stratégie d'Achat de Collection", icon:"📊", desc:"Optimisez vos achats de collections pour maximiser vos marges et la rotation des stocks.", features:["Analyse de vos fournisseurs","Négociation commerciale","Planning d'achat optimisé","Gestion des risques"] },
    { id:2, title:"Stratégie de Pricing", icon:"💰", desc:"Développez une stratégie tarifaire alignée avec votre positionnement et vos objectifs de marge.", features:["Analyse concurrentielle","Optimisation des marges","Politique de réduction","Système de promotion"] },
    { id:3, title:"Pilotage de Marque", icon:"🎯", desc:"Renforcez votre identité marque et pilotez sa croissance avec une stratégie cohérente.", features:["Audit Business interne & externe","Positionnement stratégique","Conseils en organisation","KPIs de marque"] },
    { id:4, title:"Développement Produits", icon:"✨", desc:"Créez et lancez de nouveaux produits en phase avec votre marché et vos capacités.", features:["Étude de marché","Design & sourcing","Gestion du lancement","Suivi performance"] },
  ];

  const cases = [
    { client:"Distributeur Multi-Marques (ETI)", challenge:"Rotation des stocks faible, marges érodées", solution:"Stratégie d'achat & pricing", result:"+23% de marge, -18% d'invendus", industries:"Mode Féminin Premium" },
    { client:"Chaîne Retail (PME Groupe)", challenge:"Identité marque peu claire, croissance bloquée", solution:"Pilotage de marque complet", result:"+40% de notoriété, +15% de CA", industries:"Mode Urbaine" },
    { client:"Grossiste en Mode", challenge:"Portefeuille produit vieillissant", solution:"Développement de 3 nouvelles lignes", result:"+32% du CA en 18 mois", industries:"Mode Accessoires" },
  ];

  const approach = [
    { step:"01", title:"Diagnostic", desc:"Audit approfondi de votre situation" },
    { step:"02", title:"Stratégie", desc:"Co-création d'un plan d'action" },
    { step:"03", title:"Implémentation", desc:"Accompagnement opérationnel" },
    { step:"04", title:"Suivi", desc:"Pilotage et optimisation continue" },
  ];

  const packages = [
    { name:"Diagnostic Stratégique", price:"Sur demande", duration:"6 semaines", desc:"Audit complet de votre activité mode", items:["Analyse détaillée de votre positionnement","Étude des forces/faiblesses","Recommandations stratégiques","Rapport d'audit complet"], color:"#F5F1ED" },
    { name:"Accompagnement Stratégique", price:"Sur demande", duration:"3-6 mois", desc:"Pilotage de votre transformation", items:["Implémentation du plan d'action","Support opérationnel hebdomadaire","Formation de vos équipes","Tableaux de bord personnalisés"], color:"#4A1F1F", textColor:"#D4C4B0", featured:true },
    { name:"Retainer Annuel", price:"Sur demande", duration:"À l'année", desc:"Support continu de vos enjeux", items:["Disponibilité conseil régulière","Ateliers stratégiques trimestriels","Suivi des indicateurs clés","Adaptations stratégiques"], color:"#F5F1ED" },
  ];

  const testimonials = [
    { client:"Directeur Général - Groupe Mode ETI", quote:"L'accompagnement d'Océane Maligoi a transformé notre approche du pricing et débloqué 2M€ de marge supplémentaire.", initials:"FD" },
    { client:"Responsable Merchandising - Chaîne Retail", quote:"Une réelle expertise en stratégie d'achat. Les résultats ont dépassé nos attentes dès les 3 premiers mois.", initials:"MC" },
    { client:"PDG - Distributeur Multi-Marques", quote:"Enfin quelqu'un qui comprend vraiment les enjeux du retail mode. Je recommande vivement.", initials:"SB" },
  ];

  const handleNewsletterSubmit = (e)=>{
    e.preventDefault();
    alert("Merci ! Nous vous contacterons très bientôt.");
    setEmail("");
  };

  return (
    <div className="w-full">
      {/* Nav */}
      <nav className="sticky top-0 z-50 bg-white/95 backdrop-blur border-b border-gray-200 px-4 sm:px-6 lg:px-8 py-4 flex justify-between items-center">
        <div className="text-3xl font-light" style={{color:"#4A1F1F"}}>OM CONSULTING</div>
        <div className="hidden md:flex gap-6">
          <a href="#services" className="hover:opacity-60" style={{color:"#4A1F1F"}}>SERVICES</a>
          <a href="#expertise" className="hover:opacity-60" style={{color:"#4A1F1F"}}>EXPERTISE</a>
          <a href="#offres" className="hover:opacity-60" style={{color:"#4A1F1F"}}>OFFRES</a>
          <a href="#contact" className="hover:opacity-60" style={{color:"#4A1F1F"}}>CONTACT</a>
        </div>
        <button className="md:hidden" onClick={toggleMenu}>{isMenuOpen ? "X" : "≡"}</button>
      </nav>
      {isMenuOpen && (
        <div className="md:hidden bg-white px-4 py-4 flex flex-col gap-2">
          <a href="#services">SERVICES</a>
          <a href="#expertise">EXPERTISE</a>
          <a href="#offres">OFFRES</a>
          <a href="#contact">CONTACT</a>
        </div>
      )}

      {/* Hero */}
      <section className="relative min-h-[90vh] flex items-center justify-center text-center" style={{backgroundColor:"#D4C4B0"}}>
        <div>
          <h1 style={{fontFamily:'"Le Jour Script", cursive', fontSize:"3.5rem", color:"#4A1F1F"}}>Océane Maligoi</h1>
          <h2 className="text-3xl md:text-5xl font-light" style={{color:"#4A1F1F"}}>Agence de Consulting Mode</h2>
          <p className="mt-4 max-w-xl mx-auto" style={{color:"#4A1F1F", opacity:0.85}}>Accompagnement stratégique et opérationnel pour distributeurs et entreprises de mode. Optimisez votre stratégie d'achat, votre pricing, votre marque et vos produits.</p>
          <button onClick={()=>alert("Chatbot en développement")} className="mt-6 px-6 py-3" style={{backgroundColor:"#4A1F1F", color:"#D4C4B0"}}>UNE QUESTION ? DISCUTER 💬</button>
        </div>
      </section>

      {/* Services */}
      <section id="services" className="py-20 px-4 bg-white">
        <h2 className="text-center text-4xl font-light mb-10" style={{color:"#4A1F1F"}}>Nos Services</h2>
        <div className="grid md:grid-cols-2 gap-8">
          {services.map(s=>(
            <div key={s.id} className="p-6 border rounded-lg hover:shadow-lg">
              <div className="text-4xl mb-4">{s.icon}</div>
              <h3 className="text-xl font-light mb-2">{s.title}</h3>
              <p className="mb-4 text-sm">{s.desc}</p>
              <ul className="mb-4">
                {s.features.map((f,i)=><li key={i} className="flex items-center gap-2"><CheckCircle className="w-4 h-4"/>{f}</li>)}
              </ul>
              <button className="text-sm border-b">EN SAVOIR PLUS</button>
            </div>
          ))}
        </div>
      </section>

      {/* Approche */}
      <section className="py-20 px-4 bg-gray-100">
        <h2 className="text-center text-4xl font-light mb-10" style={{color:"#4A1F1F"}}>Notre Approche</h2>
        <div className="grid md:grid-cols-4 gap-6 text-center">
          {approach.map((a,i)=>(
            <div key={i}>
              <div className="text-2xl font-light mb-2">{a.step}</div>
              <h3 className="font-light">{a.title}</h3>
              <p className="text-sm">{a.desc}</p>
              {i<3 && <ArrowRight className="w-5 h-5 mx-auto mt-4"/>}
            </div>
          ))}
        </div>
      </section>

      {/* Cases */}
      <section id="expertise" className="py-20 px-4 bg-white">
        <h2 className="text-center text-4xl font-light mb-10" style={{color:"#4A1F1F"}}>Nos Succès</h2>
        <div className="space-y-6">
          {cases.map((c,i)=>(
            <div key={i} className="p-6 border-l-4 border-gray-700 hover:shadow-lg flex flex-col md:flex-row gap-4 bg-gray-50">
              <div className="flex-1">
                <h3 className="font-light">{c.client}</h3>
                <p><strong>Enjeu:</strong> {c.challenge}</p>
                <p><strong>Solution:</strong> {c.solution}</p>
              </div>
              <div className="flex-1 text-center bg-gray-100 p-4 rounded-lg">
                <p className="uppercase text-xs opacity-60">Résultats</p>
                <p className="text-xl font-light">{c.result}</p>
                <p className="text-xs opacity-50">{c.industries}</p>
              </div>
            </div>
          ))}
        </div>
      </section>

      {/* Packages / Offres */}
      <section id="offres" className="py-20 px-4 bg-gray-100">
        <h2 className="text-center text-4xl font-light mb-10" style={{color:"#4A1F1F"}}>Nos Offres</h2>
        <div className="grid md:grid-cols-3 gap-6">
          {packages.map((p,i)=>(
            <div key={i} className="p-6 rounded-lg" style={{backgroundColor:p.color, color:p.textColor||"#4A1F1F"}}>
              <h3 className="text-xl font-light mb-1">{p.name}</h3>
              <p className="text-xs mb-2">{p.duration}</p>
              <p className="text-2xl font-light mb-2">{p.price}</p>
              <p className="text-sm mb-4">{p.desc}</p>
              <ul className="mb-4">
                {p.items.map((i2,j)=><li key={j} className="flex items-center gap-2"><CheckCircle className="w-4 h-4"/>{i2}</li>)}
              </ul>
              <button className="w-full py-2" style={{backgroundColor:p.featured?"#D4C4B0":"#4A1F1F", color:p.featured?"#4A1F1F":"#D4C4B0"}}>NOUS CONTACTER</button>
            </div>
          ))}
        </div>
      </section>

      {/* Testimonials */}
      <section className="py-20 px-4 bg-white">
        <h2 className="text-center text-4xl font-light mb-10" style={{color:"#4A1F1F"}}>Témoignages</h2>
        <div className="grid md:grid-cols-3 gap-6">
          {testimonials.map((t,i)=>(
            <div key={i} className="p-6 rounded-lg border-t-4 border-gray-700">
              <div className="flex items-center gap-2 mb-4">
                <div className="w-10 h-10 rounded-full flex items-center justify-center bg-gray-700 text-white">{t.initials}</div>
                <p className="text-sm">{t.client}</p>
              </div>
              <p className="italic">{t.quote}</p>
            </div>
          ))}
        </div>
      </section>

      {/* Newsletter / Contact */}
      <section id="contact" className="py-20 px-4 bg-gray-700 text-gray-100 text-center">
        <h2 className="text-3xl font-light mb-4">Discutons de Vos Enjeux</h2>
        <p className="mb-6">Prenez rendez-vous pour un audit stratégique gratuit. Découvrez comment nous pouvons accélérer votre croissance.</p>
        <form onSubmit={handleNewsletterSubmit} className="max-w-md mx-auto space-y-4">
          <input type="email" required placeholder="votre@email.com" value={email} onChange={e=>setEmail(e.target.value)} className="w-full px-4 py-2 rounded"/>
          <input type="text" placeholder="Votre entreprise" className="w-full px-4 py-2 rounded"/>
          <button type="submit" className="w-full py-2" style={{backgroundColor:"#D4C4B0", color:"#4A1F1F"}}>DEMANDER UN AUDIT</button>
        </form>
      </section>

      {/* Footer */}
      <footer className="py-8 px-4 bg-white text-gray-700 text-xs text-center">
        <p>© 2024 Océane Maligoi Consulting. Tous droits réservés.</p>
      </footer>
    </div>
  )
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />)

</script>
</body>
</html>
